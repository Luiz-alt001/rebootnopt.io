<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>No Portuguese | Be Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white">

    <nav class="fixed w-full z-50 py-6 px-8 md:px-16 flex justify-between items-center transition-all duration-500">
        <div class="logo font-black text-2xl tracking-tighter uppercase">
            NO <span class="text-yellow-400">PORTUGUESE</span>
        </div>
        
        <div class="hidden md:flex space-x-10 text-[10px] font-bold uppercase tracking-[4px]">
            <a href="#" class="hover:text-yellow-400 transition">Método</a>
            <a href="#" class="hover:text-yellow-400 transition">A Teacher</a>
            <a href="#" class="hover:text-yellow-400 transition">Planos</a>
        </div>

        <a href="#" class="bg-yellow-400 text-black px-6 py-2 text-[10px] font-black uppercase hover:bg-white transition">
            Matrículas
        </a>
    </nav>

    <section class="h-screen relative flex items-center justify-center overflow-hidden">
        <div class="relative z-10 text-center px-6">
            <span class="block text-xs font-black tracking-[10px] uppercase mb-6 text-yellow-400/80">
                Since 2018 / Paulini Medeiros
            </span>
            
            <h1 class="text-6xl md:text-[130px] font-black leading-none uppercase tracking-tighter mb-8 italic">
                SAY <span class="outline-yellow font-black not-italic">NO</span> <br>PORTUGUESE.
            </h1>
            
            <p class="text-lg md:text-2xl font-medium text-zinc-400 max-w-2xl mx-auto mb-12 leading-relaxed">
                A imersão que proíbe o português para libertar a sua fala. <br>
                Domine o bilinguismo em <span class="text-yellow-400 font-black italic">70 aulas</span>.
            </p>
            
            <div class="flex flex-col md:flex-row gap-6 justify-center items-center">
                <a href="#" class="bg-yellow-400 text-black px-12 py-5 font-black uppercase text-xs tracking-widest hover:bg-white transition duration-300 shadow-[0_0_30px_rgba(250,204,21,0.3)]">
                    Iniciar Jornada
                </a>
                <span class="text-[10px] uppercase font-bold tracking-widest opacity-40 italic border-l border-white/20 pl-6">
                    Zero português desde o nível 0
                </span>
            </div>
        </div>

        <div class="absolute left-10 bottom-10 hidden lg:block">
            <p class="rotate-90 origin-left text-[10px] font-black tracking-[10px] uppercase opacity-20">Campos dos Goytacazes - RJ</p>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
